          pip install buildozer cython
          pip install --upgrade setuptools  # Fix for potential issues
      
      - name: Create buildozer.spec if missing
        run: |
          if [ ! -f buildozer.spec ]; then
            echo "Creating default buildozer.spec"
            cat > buildozer.spec << 'EOF'
[app]
title = Video Editor
package.name = videoeditor
package.domain = org.videoeditor
source.dir = .
requirements = python3,kivy
version = 0.1
android.permissions = READ_EXTERNAL_STORAGE
[buildozer]
log_level = 2
EOF
          fi
      
      - name: Build with Buildozer
        run: |
          # Ensure buildozer.spec exists
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          # Start the build
          buildozer -v android debug
