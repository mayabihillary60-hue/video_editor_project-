name: Build Android APK

on:
  push:
    branches: [ "*" ]  # This means ALL branches
    paths-ignore:
      - '**.md'  # Don't run when only README changes
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest
    if: always()  # This ensures it runs
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Get full history for branch detection
      
      - name: Show branch info (debug)
        run: |
          echo "Current branch: $(git branch --show-current)"
          echo "GitHub ref: ${{ github.ref }}"
          echo "GitHub event: ${{ github.event_name }}"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython
          pip install --upgrade setuptools  # Fix for potential issues
      
      - name: Create buildozer.spec if missing
        run: |
          if [ ! -f buildozer.spec ]; then
            echo "Creating default buildozer.spec"
            cat > buildozer.spec << 'EOF'
[app]
title = Video Editor
package.name = videoeditor
package.domain = org.videoeditor
source.dir = .
requirements = python3,kivy
version = 0.1
android.permissions = READ_EXTERNAL_STORAGE
[buildozer]
log_level = 2
EOF
          fi
      
      - name: Build with Buildozer
        run: |
          # Ensure buildozer.spec exists
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          # Start the build
          buildozer -v android debug
        continue-on-error: true  # Keep going even if build fails
      
      - name: Upload APK
        if: always()  # Always upload, even if previous steps fail
        uses: actions/upload-artifact@v4
        with:
          name: video-editor-apk
          path: |
            bin/*.apk
            *.apk