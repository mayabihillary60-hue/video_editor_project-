name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            wget \
            unzip \
            python3-pip \
            python3-setuptools \
            python3-dev \
            build-essential \
            libssl-dev \
            libffi-dev \
            libjpeg-dev \
            zlib1g-dev \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libgl1-mesa-dev \
            libglx-mesa0 \
            libgles2-mesa-dev \
            libdrm-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            cmake \
            ccache \
            ninja-build \
            openjdk-17-jdk
        
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel cython
          pip install buildozer cython
      
      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = Video Editor
          package.name = videoeditor
          package.domain = org.videoeditor
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas
          version = 0.1
          requirements = python3,kivy==2.2.1
          orientation = portrait
          osx.python_version = 3
          osx.kivy_version = 2.2.1
          fullscreen = 0

          [buildozer]
          log_level = 2
          warn_on_root = 1

          [android]
          api = 33
          minapi = 21
          ndk = 25b
          android.accept_sdk_license = True
          EOF

[android]
